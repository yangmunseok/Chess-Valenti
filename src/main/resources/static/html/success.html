<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="_csrf" content="${_csrf.token}"/>
  <meta name="_csrf_header" content="${_csrf.headerName}"/>
</head>
<body>
<div class="container full-height-center">
  <div class="success-full-card">
    <div class="success-header-visual">
      <div class="glow-orb"></div>
      <div class="check-animation">
        <svg class="checkmark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52">
          <circle class="checkmark__circle" cx="26" cy="26" r="25" fill="none"/>
          <path class="checkmark__check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
        </svg>
      </div>
    </div>

    <div class="success-content">
      <h1>후원이 완료되었습니다!</h1>
      <p class="thanks-msg">양문석님의 소중한 후원은 더 정교한 분석 서비스를 만드는 데 큰 힘이 됩니다.</p>

      <div class="payment-summary">
        <div class="summary-item">
          <span>결제 금액</span>
          <strong id="display-amount">₩10,000</strong>
        </div>
        <div class="summary-item">
          <span>후원 등급</span>
          <span class="tier-tag">Knight Tier</span>
        </div>
        <div class="summary-item">
          <span>결제 일시</span>
          <span id="display-date">2026.04.02 21:15</span>
        </div>
      </div>

      <div class="success-actions">
        <button class="stat-btn-primary" onclick="location.href='insight.html'">분석 페이지로 돌아가기
        </button>
        <button class="btn-outline-sm" onclick="window.print()">영수증 출력</button>
      </div>
    </div>

    <div class="share-section">
      <span>주변에 공유하기</span>
      <div class="share-icons">
        <button class="share-btn">🔗</button>
        <button class="share-btn">🐦</button>
      </div>
    </div>
  </div>
</div>
<h2>결제 성공</h2>
<p id="paymentKey"></p>
<p id="orderId"></p>
<p id="amount"></p>

<script>
  // 쿼리 파라미터 값이 결제 요청할 때 보낸 데이터와 동일한지 반드시 확인하세요.
  // 클라이언트에서 결제 금액을 조작하는 행위를 방지할 수 있습니다.
  const urlParams = new URLSearchParams(window.location.search);
  const paymentKey = urlParams.get("paymentKey");
  const orderId = urlParams.get("orderId");
  const amount = urlParams.get("amount");

  async function confirm() {
    const requestData = {
      paymentKey: paymentKey,
      orderId: orderId,
      amount: amount,
    };

    const response = await fetch("/payment/confirm", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify(requestData),
    });

    const json = await response.json();

    if (!response.ok) {
      // 결제 실패 비즈니스 로직을 구현하세요.
      console.log(json);
      //window.location.href = `/html/fail.html?message=${json.message}&code=${json.code}`;
    }

    // 결제 성공 비즈니스 로직을 구현하세요.
    console.log(json);
  }

  confirm();

  const paymentKeyElement = document.getElementById("paymentKey");
  const orderIdElement = document.getElementById("orderId");
  const amountElement = document.getElementById("amount");

  orderIdElement.textContent = "주문번호: " + orderId;
  amountElement.textContent = "결제 금액: " + amount;
  paymentKeyElement.textContent = "paymentKey: " + paymentKey;
</script>
</body>
</html>
