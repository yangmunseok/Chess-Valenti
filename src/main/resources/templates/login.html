<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>valenti - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
  <link th:href="@{/css/app.css}" rel="stylesheet">
  <link th:href="@{/css/login.css}" rel="stylesheet">
  <link th:href="@{/css/btn-refactor.css}" rel="stylesheet">
</head>
<body>
<div class="login-wrapper">
  <div class="login-card">
    <div class="logo">
      <div class="logo-dot"></div>
      valenti
    </div>

    <div class="login-header">
      <h1>로그인</h1>
      <p>이메일과 비밀번호를 입력해주세요.</p>
    </div>

    <form action="/login" method="POST" class="login-form">
      <div class="input-group">
        <label for="email">이메일</label>
        <input type="email" id="email" name="username" placeholder="name@example.com" required
               autofocus>
      </div>

      <div class="input-group">
        <div class="label-row">
          <label for="password">비밀번호</label>
          <a href="/forgot-password" class="helper-link">비밀번호 찾기</a>
        </div>
        <input type="password" id="password" name="password" placeholder="••••••••" required>
      </div>

      <input type="hidden"
             th:name="${_csrf.parameterName}"
             th:value="${_csrf.token}"/>

      <button type="submit" class="btn btn-primary btn-lg">로그인</button>
    </form>

    <div class="footer-links">
      아직 계정이 없으신가요? <a href="/signup">회원가입</a>
    </div>
  </div>
</div>
</body>
</html>
