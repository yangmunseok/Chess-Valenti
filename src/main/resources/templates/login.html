<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-DBMLJY2F5L"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-DBMLJY2F5L');
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>valenti - Login</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <link th:href="@{/css/app.css}" rel="stylesheet">
  <link th:href="@{/css/login.css}" rel="stylesheet">
  <link th:href="@{/css/btn-refactor.css}" rel="stylesheet">
</head>
<body>
<div class="login-wrapper">
  <div class="login-card">
    <div class="logo">
      <div class="logo-dot"></div>
      valenti
    </div>

    <div class="login-header">
      <h1>로그인</h1>
      <p>이메일 또는 계정 이름을 입력해주세요.</p>
    </div>

    <div th:if="${param.resetRequested}" class="alert alert-info" style="color: #3b82f6; background: rgba(59, 130, 246, 0.1); padding: 12px; border-radius: 8px; margin-bottom: 16px; font-size: 14px;">
      비밀번호 재설정 링크가 이메일로 전송되었습니다.
    </div>
    <div th:if="${param.resetSuccess}" class="alert alert-success" style="color: #10b981; background: rgba(16, 185, 129, 0.1); padding: 12px; border-radius: 8px; margin-bottom: 16px; font-size: 14px;">
      비밀번호가 성공적으로 변경되었습니다.
    </div>
    <div th:if="${param.error == 'invalidToken'}" class="alert alert-danger" style="color: #f7768e; background: rgba(247, 118, 142, 0.1); padding: 12px; border-radius: 8px; margin-bottom: 16px; font-size: 14px;">
      유효하지 않은 토큰입니다.
    </div>
    <div th:if="${param.error == 'expired'}" class="alert alert-danger" style="color: #f7768e; background: rgba(247, 118, 142, 0.1); padding: 12px; border-radius: 8px; margin-bottom: 16px; font-size: 14px;">
      만료된 토큰입니다.
    </div>
    <div th:if="${param.error != null and param.error != 'invalidToken' and param.error != 'expired'}" class="alert alert-danger" style="color: #f7768e; background: rgba(247, 118, 142, 0.1); padding: 12px; border-radius: 8px; margin-bottom: 16px; font-size: 14px;">
      이메일/계정 이름 또는 비밀번호가 올바르지 않습니다.
    </div>

    <form action="/login" method="POST" class="login-form">
      <div class="input-group">
        <label for="username">이메일 또는 계정 이름</label>
        <input type="text" id="username" name="username" placeholder="이메일 또는 계정 이름" required
               autofocus>
      </div>

      <div class="input-group">
        <div class="label-row">
          <label for="password">비밀번호</label>
          <a href="/forgot-password" class="helper-link">비밀번호 찾기</a>
        </div>
        <input type="password" id="password" name="password" placeholder="••••••••" required>
      </div>

      <input type="hidden"
             th:name="${_csrf.parameterName}"
             th:value="${_csrf.token}"/>

      <button type="submit" class="btn btn-primary btn-lg">로그인</button>
    </form>

    <div class="footer-links">
      아직 계정이 없으신가요? <a href="/signup">회원가입</a>
    </div>
  </div>
</div>
</body>
</html>
