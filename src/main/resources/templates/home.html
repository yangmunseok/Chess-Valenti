<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Title</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
  <link th:href="@{/css/app.css}" rel="stylesheet">
  <link th:href="@{/css/stat.css}" rel="stylesheet">
  <link th:href="@{/css/home.css}" rel="stylesheet">
  <link th:href="@{/css/btn-refactor.css}" rel="stylesheet">
</head>
<body>
<div class="dashboard-wrapper">
  <div th:replace="~{fragment/component :: sidebar(username=${username}, url='')}"></div>

  <main class="main-content">
    <div class="home-container">
      <header class="home-hero">
        <p class="hero-label">ADVANCED CHESS INSIGHTS</p>
        <h1>안녕하세요, <span class="blue-text" th:text="${username}">User</span>님</h1>
        <p class="hero-desc">발렌티의 정밀 알고리즘으로 당신의 모든 대국을 해부합니다.</p>

        <div class="banner-group" style="display: flex; gap: 20px; margin-top: 32px;">
          <div class="action-banner" onclick="location.href='/insight'" style="flex: 1; margin-top: 0;">
            <div class="action-text">
              <h3>나의 대국 인사이트</h3>
              <p>Lichess 데이터를 불러와 패턴을 분석합니다.</p>
            </div>
            <span class="action-arrow">→</span>
          </div>

          <div class="action-banner" onclick="location.href='/analysis'" style="flex: 1; margin-top: 0; background: rgba(59, 130, 246, 0.05); border: 1px solid rgba(59, 130, 246, 0.2);">
            <div class="action-text">
              <h3>폰 구조 분석 도구</h3>
              <p>특정 구조를 탐색하고 마스터 대국을 검색합니다.</p>
            </div>
            <span class="action-arrow" style="color: var(--accent-blue);">→</span>
          </div>
        </div>
      </header>

      <div class="content-grid">

        <section class="table-section">
          <div class="section-header">
            <h2>■ ANNOUNCEMENT</h2>
            <a href="#" class="btn-text">전체보기</a>
          </div>
          <div class="data-table">
            <div th:each="notice : ${notices}" class="table-row">
              <div class="col-meta"
                   th:text="${@timeUtil.format(notice.createdAt,'yyyy-MM-dd HH:mm')}"></div>
              <div class="col-main" th:text="${notice.title}"></div>
              <a class="col-action" th:href="@{/posts/{id}(id=${notice.postId})}">→</a>
            </div>
            <!--div class="table-row important">
              <div class="col-meta">04.09</div>
              <div class="col-main">시스템 점검 및 DB 최적화 작업 안내 (04/15)</div>
              <div class="col-action">→</div>
            </div>
            <div class="table-row">
              <div class="col-meta">04.05</div>
              <div class="col-main">폰 구조 분석 알고리즘 v2.5 업데이트</div>
              <div class="col-action">→</div>
            </div>
            <div class="table-row">
              <div class="col-meta">03.30</div>
              <div class="col-main">후원자 전용 '명예의 전당' 페이지 오픈</div>
              <div class="col-action">→</div>
            </div-->
          </div>
        </section>

        <section class="table-section">
          <div class="section-header">
            <h2>■ FAQ</h2>
          </div>
          <div class="faq-table">
            <details th:each="faq, faqStat: ${faqs}" class="faq-item">
              <summary>
                <div class="col-meta" th:text="|FAQ ${faqStat.count}|"></div>
                <div class="col-main" th:text="${faq.title}"></div>
                <div class="col-action"><span class="plus-icon">+</span></div>
              </summary>
              <div class="faq-content">
                <p th:text="${faq.content}"></p>
              </div>
            </details>
          </div>
        </section>

      </div>
    </div>
  </main>
</div>
</body>
</html>
