<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-DBMLJY2F5L"></script>
  <script>
    window.dataLayer = window.dataLayer || [];

    function gtag() {
      dataLayer.push(arguments);
    }

    gtag('js', new Date());

    gtag('config', 'G-DBMLJY2F5L');
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>valenti - Pawn Games</title>
  <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"/>
  <link th:href="@{/css/app.css}" rel="stylesheet">
  <link th:href="@{/css/analysis.css}" rel="stylesheet">
  <link th:href="@{/css/btn-refactor.css}" rel="stylesheet">
  <style>
    .pawn-games-header {
      display: flex;
      align-items: center;
      gap: 30px;
      margin-bottom: 40px;
      padding: 30px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 20px;
      border: 1px solid var(--border-color);
    }

    .preview-board-wrapper {
      width: 200px;
      height: 200px;
      flex-shrink: 0;
    }

    .header-info h1 {
      font-size: 24px;
      margin-bottom: 10px;
    }

    .header-info p {
      color: var(--text-secondary);
      font-size: 14px;
    }

    .results-container {
      width: 100%;
      max-width: 1000px;
    }

    @media (max-width: 768px) {
      .pawn-games-header {
        flex-direction: column;
        padding: 20px;
        gap: 20px;
        text-align: center;
        margin-bottom: 24px;
      }

      .preview-board-wrapper {
        width: 150px;
        height: 150px;
      }

      .header-info h1 {
        font-size: 20px;
      }

      .hide-mobile {
        display: none;
      }

      .game-table th, .game-table td {
        padding: 12px 8px;
        font-size: 13px;
      }

      .mobile-stack {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .player-sub {
        font-size: 11px;
        color: var(--text-secondary);
      }
    }
  </style>
</head>
<body>
<div class="dashboard-wrapper">
  <div th:replace="~{fragment/component :: sidebar(username=${username}, url='/insight')}"></div>

  <main class="main-content">
    <div class="results-container">
      <div class="pawn-games-header">
        <div class="preview-board-wrapper">
          <div id="preview-board" class="board"></div>
        </div>
        <div class="header-info">
          <p class="hero-label">PAWN STRUCTURE EXPLORER</p>
          <h1>Selected <span class="blue-text">Structure</span> Games</h1>
          <p>이 폰 구조가 나타나는 마스터들의 실전 대국을 분석해보세요.</p>
        </div>
      </div>

      <div id="pawn-structure-analysis" class="analysis-footer" style="display: block;">
        <div class="stats-header">
          <div class="stats-item">
            <span class="stats-label">총 게임 수</span>
            <span class="stats-value" id="total-games">0</span>
          </div>
        </div>

        <div class="game-list-container">
          <table class="game-table">
            <thead>
            <tr>
              <th class="hide-mobile">Event</th>
              <th>Players</th>
              <th>Result</th>
              <th class="hide-mobile">Date</th>
              <th>View</th>
            </tr>
            </thead>
            <tbody id="game-list-body">
            <tr>
              <td colspan="5"
                  style="text-align: center; padding: 40px; color: var(--text-secondary);">
                게임 데이터를 불러오고 있습니다...
              </td>
            </tr>
            </tbody>
          </table>
        </div>

        <div class="pagination-controls">
          <button id="prev-page" class="page-btn" disabled>이전</button>
          <span id="page-info">1 / 1</span>
          <button id="next-page" class="page-btn" disabled>다음</button>
        </div>
      </div>
    </div>
  </main>
</div>

<script type="module" th:inline="javascript">
  import {initBoard, renderBoardFromFen} from "/js/board.js";

  const targetFen = /*[[${fen}]]*/ "";
  let currentPage = 0; // 0-indexed for backend
  const itemsPerPage = 15;
  let totalPages = 0;

  // Initialize
  initBoard('preview-board');
  renderBoardFromFen(targetFen, 'preview-board');
  fetchGames(0);

  async function fetchGames(page) {
    currentPage = page;
    const url = `/api/games/paginated?fen=${encodeURIComponent(
        targetFen)}&page=${page}&size=${itemsPerPage}`;

    document.getElementById(
        'game-list-body').innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 40px; color: var(--text-secondary);">게임 데이터를 불러오고 있습니다...</td></tr>';

    try {
      const res = await fetch(url);
      if (!res.ok) {
        throw new Error('Fetch failed');
      }

      const data = await res.json();
      console.log(data);
      totalPages = data.page.totalPages;

      document.getElementById('total-games').innerText = data.page.totalElements;
      renderGameTable(data.content);
      updatePaginationControls();

      if (data.content.length === 0) {
        document.getElementById(
            'game-list-body').innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 40px; color: var(--text-secondary);">해당 구조의 게임이 없습니다.</td></tr>';
      }
    } catch (err) {
      console.error(err);
      document.getElementById(
          'game-list-body').innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 40px; color: var(--danger);">데이터를 불러오지 못했습니다.</td></tr>';
    }
  }

  function renderGameTable(games) {
    const tbody = document.getElementById('game-list-body');
    const isMobile = window.innerWidth <= 768;

    tbody.innerHTML = games.map(game => `
      <tr>
          <td class="hide-mobile">${game.event}</td>
          <td>
            <div class="mobile-stack">
              <span>${game.whitePlayer.name} <small class="player-sub">(${game.whitePlayer.elo})</small></span>
              <span>${game.blackPlayer.name} <small class="player-sub">(${game.blackPlayer.elo})</small></span>
            </div>
          </td>
          <td class="result-cell">${game.result}</td>
          <td class="hide-mobile">${game.date}</td>
          <td><a class="view-btn" href="/games/${game.gameOffset}?idx=${game.moveIdx}" target="_blank">👁️</a></td>
      </tr>
    `).join('');
  }

  function updatePaginationControls() {
    document.getElementById('page-info').innerText = `${currentPage + 1} / ${Math.max(1,
        totalPages)}`;
    document.getElementById('prev-page').disabled = (currentPage === 0);
    document.getElementById('next-page').disabled = (currentPage >= totalPages - 1 || totalPages
        === 0);
  }

  document.getElementById('prev-page').onclick = () => {
    if (currentPage > 0) {
      fetchGames(currentPage - 1);
    }
  };
  document.getElementById('next-page').onclick = () => {
    if (currentPage < totalPages - 1) {
      fetchGames(currentPage + 1);
    }
  };

</script>
</body>
</html>
