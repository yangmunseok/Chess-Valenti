<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-DBMLJY2F5L"></script>
  <script>
    window.dataLayer = window.dataLayer || [];

    function gtag() {
      dataLayer.push(arguments);
    }

    gtag('js', new Date());

    gtag('config', 'G-DBMLJY2F5L');
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>valenti - Pawn Games</title>
  <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"/>
  <link th:href="@{/css/app.css}" rel="stylesheet">
  <link th:href="@{/css/analysis.css}" rel="stylesheet">
  <link th:href="@{/css/btn-refactor.css}" rel="stylesheet">
  <style>
    .pawn-games-header {
      display: flex;
      align-items: center;
      gap: 30px;
      margin-bottom: 40px;
      padding: 30px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 20px;
      border: 1px solid var(--border-color);
    }

    .preview-board-wrapper {
      width: 200px;
      height: 200px;
      flex-shrink: 0;
    }

    .header-info h1 {
      font-size: 24px;
      margin-bottom: 10px;
    }

    .header-info p {
      color: var(--text-secondary);
      font-size: 14px;
    }

    .results-container {
      width: 100%;
      max-width: 1200px;
    }

    /* Improved Table Styles */
    .game-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 4px;
      margin-top: 10px;
    }

    .game-table th {
      background: rgba(255, 255, 255, 0.02);
      padding: 16px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
      text-align: left;
      border-bottom: 1px solid var(--border-color);
    }

    .game-table td {
      padding: 16px;
      background: rgba(255, 255, 255, 0.01);
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
      vertical-align: middle;
    }

    .game-table tr:hover td {
      background: rgba(59, 130, 246, 0.05);
      border-bottom-color: rgba(59, 130, 246, 0.2);
    }

    .player-name-bold {
      font-weight: 700;
      color: #fff;
      display: block;
    }

    .elo-cell {
      color: var(--text-secondary);
      font-family: 'JetBrains Mono', monospace;
      font-weight: 500;
      font-size: 13px;
    }

    .game-list-container {
      width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      margin-bottom: 20px;
    }

    .badge-result {
      background: rgba(255, 255, 255, 0.05);
      padding: 4px 10px;
      border-radius: 6px;
      font-weight: 800;
      font-size: 12px;
      border: 1px solid var(--border-color);
      color: #fff;
      display: inline-block;
      min-width: 60px;
      text-align: center;
    }

    .player-cell {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .show-mobile {
      display: none;
    }

    @media (max-width: 1024px) {
      .results-container {
        padding: 0 10px;
      }
    }

    @media (max-width: 768px) {
      .pawn-games-header {
        flex-direction: column;
        padding: 20px;
        gap: 20px;
        text-align: center;
        margin-bottom: 24px;
      }

      .preview-board-wrapper {
        width: 150px;
        height: 150px;
      }

      .header-info h1 {
        font-size: 20px;
      }

      .hide-mobile {
        display: none !important;
      }

      .show-mobile {
        display: block;
      }

      .game-table th, .game-table td {
        padding: 12px 10px;
        font-size: 13px;
      }

      .player-sub {
        font-size: 11px;
        color: var(--accent-blue);
        opacity: 0.8;
      }

      .view-btn {
        padding: 8px;
      }
    }
  </style>
</head>
<body>
<div class="dashboard-wrapper">
  <div th:replace="~{fragment/component :: sidebar(username=${username}, url='/insight')}"></div>

  <main class="main-content">
    <div class="results-container">
      <div class="pawn-games-header">
        <div class="preview-board-wrapper">
          <div id="preview-board" class="board"></div>
        </div>
        <div class="header-info">
          <p class="hero-label">PAWN STRUCTURE EXPLORER</p>
          <h1>Selected <span class="blue-text">Structure</span> Games</h1>
          <p>이 폰 구조가 나타나는 마스터들의 실전 대국을 분석해보세요.</p>
        </div>
      </div>

      <div id="pawn-structure-analysis" class="analysis-footer" style="display: block;">
        <div class="stats-header">
          <div class="stats-item">
            <span class="stats-label">총 게임 수</span>
            <span class="stats-value" id="total-games">0</span>
          </div>
        </div>

        <div class="game-list-container">
          <table class="game-table">
            <thead>
            <tr>
              <th class="hide-mobile">Event</th>
              <th>White</th>
              <th class="hide-mobile">Elo</th>
              <th>Black</th>
              <th class="hide-mobile">Elo</th>
              <th>Result</th>
              <th class="hide-mobile">Date</th>
            </tr>
            </thead>
            <tbody id="game-list-body">
            <tr>
              <td colspan="8"
                  style="text-align: center; padding: 40px; color: var(--text-secondary);">
                게임 데이터를 불러오고 있습니다...
              </td>
            </tr>
            </tbody>
          </table>
        </div>

        <div class="pagination-controls">
          <button id="prev-page" class="page-btn" disabled>이전</button>
          <span id="page-info">1 / 1</span>
          <button id="next-page" class="page-btn" disabled>다음</button>
        </div>
      </div>
    </div>
  </main>
</div>

<script type="module" th:inline="javascript">
  import {initBoard, renderBoardFromFen} from "/js/board.js";

  const targetFen = /*[[${fen}]]*/ "";
  let currentPage = 0; // 0-indexed for backend
  const itemsPerPage = 15;
  let totalPages = 0;

  // Initialize
  initBoard('preview-board');
  renderBoardFromFen(targetFen, 'preview-board');
  fetchGames(0);

  async function fetchGames(page) {
    currentPage = page;
    const url = `/api/games/paginated?fen=${encodeURIComponent(
        targetFen)}&page=${page}&size=${itemsPerPage}`;

    document.getElementById(
        'game-list-body').innerHTML = '<tr><td colspan="8" style="text-align: center; padding: 40px; color: var(--text-secondary);">게임 데이터를 불러오고 있습니다...</td></tr>';

    try {
      const res = await fetch(url);
      if (!res.ok) {
        throw new Error('Fetch failed');
      }

      const data = await res.json();
      console.debug("Fetched games data:", data);

      totalPages = data.page.totalPages;
      const totalElements = (data.page.totalElements !== undefined) ? data.page.totalElements
          : 0;

      document.getElementById('total-games').innerText = totalElements.toLocaleString();
      renderGameTable(data.content);
      updatePaginationControls();

      if (!data.content || data.content.length === 0) {
        document.getElementById(
            'game-list-body').innerHTML = '<tr><td colspan="8" style="text-align: center; padding: 40px; color: var(--text-secondary);">해당 구조의 게임이 없습니다.</td></tr>';
      }
    } catch (err) {
      console.error(err);
      document.getElementById(
          'game-list-body').innerHTML = '<tr><td colspan="8" style="text-align: center; padding: 40px; color: var(--danger);">데이터를 불러오지 못했습니다.</td></tr>';
    }
  }

  function renderGameTable(games) {
    const tbody = document.getElementById('game-list-body');
    if (!games) {
      return;
    }

    tbody.innerHTML = games.map(game => `
      <tr onclick="window.open('/games/${game.gameOffset}?idx=${game.moveIdx}', '_blank')">
          <td class="hide-mobile" style="max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${game.event
    || '-'}</td>
          <td>
            <div class="player-cell">
              <span class="player-name-bold">${game.whitePlayer?.name || 'Unknown'}</span>
              <span class="show-mobile player-sub">${game.whitePlayer?.elo || '-'}</span>
            </div>
          </td>
          <td class="hide-mobile elo-cell">${game.whitePlayer?.elo || '-'}</td>
          <td>
            <div class="player-cell">
              <span class="player-name-bold">${game.blackPlayer?.name || 'Unknown'}</span>
              <span class="show-mobile player-sub">${game.blackPlayer?.elo || '-'}</span>
            </div>
          </td>
          <td class="hide-mobile elo-cell">${game.blackPlayer?.elo || '-'}</td>
          <td class="result-cell"><span class="badge-result">${game.result}</span></td>
          <td class="hide-mobile">${game.date || '-'}</td>
      </tr>
    `).join('');
  }

  function updatePaginationControls() {
    document.getElementById('page-info').innerText = `${currentPage + 1} / ${Math.max(1,
        totalPages)}`;
    document.getElementById('prev-page').disabled = (currentPage === 0);
    document.getElementById('next-page').disabled = (currentPage >= totalPages - 1 || totalPages
        === 0);
  }

  document.getElementById('prev-page').onclick = () => {
    if (currentPage > 0) {
      fetchGames(currentPage - 1);
    }
  };
  document.getElementById('next-page').onclick = () => {
    if (currentPage < totalPages - 1) {
      fetchGames(currentPage + 1);
    }
  };

</script>
</body>
</html>

</html>
