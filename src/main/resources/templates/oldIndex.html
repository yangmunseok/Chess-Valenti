<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>valenti - Chess</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
  <link href="https://fonts.cdnfonts.com/css/chess-alpha" rel="stylesheet">
  <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>

<div class="sidebar">
  <div class="logo">
    <div class="logo-dot"></div>
    valenti
  </div>
  <div class="nav-item active">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2">
      <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
      <line x1="3" y1="9" x2="21" y2="9"/>
      <line x1="9" y1="21" x2="9" y2="9"/>
    </svg>
    Current Game
  </div>
  <div class="nav-item">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2">
      <path d="M12 20v-6M6 20V10M18 20V4"/>
    </svg>
    Analysis
  </div>
  <div class="nav-item">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2">
      <circle cx="12" cy="12" r="10"/>
      <polyline points="12 6 12 12 16 14"/>
    </svg>
    History
  </div>
</div>

<div class="main-content">

  <div class="board-container">
    <div class="player-info">
      <div class="player-profile">
        <div class="avatar">AS</div>
        <div class="player-name">
          <span th:text="${game.blackPlayer}"></span>
          <span class="player-tag" th:text="${blackTitle}"></span>
        </div>
      </div>
      <div class="player-tag" th:text="${game.blackPlayer.elo}"></div>
    </div>

    <div class="board" id="chess-board" th:data-board="${board}"></div>

    <div class="player-info">
      <div class="player-profile">
        <div class="avatar" style="background: rgba(59, 130, 246, 0.1); color: var(--accent-blue);">
          Y
        </div>
        <div class="player-name">
          <span th:text="${game.whitePlayer}"></span>
          <span class="player-tag" th:text="${whiteTitle}"></span>
        </div>
      </div>
      <div class="player-tag" th:text="${game.whitePlayer.elo}"></div>
    </div>
  </div>

  <div class="game-panel">
    <div class="panel-header">
      <div class="tab active">Moves</div>
      <div class="tab">Chat</div>
    </div>

    <div class="bonus-message">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2">
        <path
            d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
      </svg>
      Welcome to the bonus stage!
    </div>

    <div class="move-history" id="move-history">
      <div class="move-row starting">
        <div class="dot-indicator"></div>
        Starting position
      </div>
    </div>

    <div class="controls">
      <button class="btn danger">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2">
          <path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/>
          <line x1="4" y1="22" x2="4" y2="15"/>
        </svg>
        Resign
      </button>
      <button class="btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2">
          <path d="M3 7v6h6"/>
          <path d="M21 17a9 9 0 00-9-9 9 9 0 00-6 2.3L3 13"/>
        </svg>
        Undo
      </button>
    </div>
  </div>

</div>

<script>
  const boardEl = document.getElementById('chess-board');
  const board = boardEl.dataset.board.replace(/[\[\]\s]/g, "").split(",");
  console.log(board);
  // Draw the 8x8 Grid
  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      const square = document.createElement('div');
      const isLight = (r + c) % 2 === 0;

      square.className = `square ${isLight ? 'light' : 'dark'}`;

      const pieceData = board[(7 - r) * 8 + c];
      let piece = "";
      let isWhite = true;
      switch (pieceData) {
        case "WHITE_PAWN":
          piece = "p";
          break;

        case "WHITE_KNIGHT":
          piece = "h";
          break;
        case "WHITE_BISHOP":
          piece = "b";
          break;
        case "WHITE_ROOK":
          piece = "r";
          break;
        case "WHITE_QUEEN":
          piece = "q";
          break;
        case "WHITE_KING":
          piece = "k";
          break;
        case "BLACK_PAWN":
          piece = "o";
          isWhite = false;
          break;
        case "BLACK_KNIGHT":
          piece = "j";
          isWhite = false;
          break;
        case "BLACK_BISHOP":
          piece = "n";
          isWhite = false;
          break;
        case "BLACK_ROOK":
          piece = "t";
          isWhite = false;
          break;
        case "BLACK_QUEEN":
          piece = "w";
          isWhite = false;
          break;
        case "BLACK_KING":
          piece = "l";
          isWhite = false;
          break;

      }
      if (pieceData) {
        const pieceSpan = document.createElement('span');
        pieceSpan.className = `piece${isWhite ? ' w' : ' b'}`;
        pieceSpan.textContent = piece;
        square.appendChild(pieceSpan);
      }

      boardEl.appendChild(square);
    }
  }

  // --- 2. Parse and Render PGN Move List ---
  const pgnString = "1. e4 e5 2. Nf3 Nc6 3. Bb5 a6 4. Bxc6 dxc6 5. O-O Qf6 6. d4 exd4 7. Bg5 Qd6 8. Nxd4 Be7 9. Be3 Nf6 10. f3 c5 11. Ne2 Be6 12. Nf4 O-O-O 13. Qxd6 cxd6 14. Nc3 d5 15. exd5 Nxd5 16. Nfxd5 Bxd5 17. Na4 Bf6 18. Bxc5 b5 19. Nc3 Bxc3 20. bxc3 Bc4 21. Rf2 Rhe8 22. Bd4 f6 23. Rd2 Re6 24. a3 Rde8 25. h4 Re2 26. Rad1 Rxd2 27. Rxd2 Re2 28. Rxe2 Bxe2 29. h5 Kd7 30. Kf2 Bd1 31. h6 gxh6 32. Ke3 Bxc2 33. Bxf6 Ke6 34. Bg7 h5 35. Kd4 a5 36. Be5 a4 37. Bc7 Kf5 38. c4 bxc4 39. Kxc4 Bb3+ 40. Kd4 Bc2 41. Kd5 Bb3+";

  const moveHistoryContainer = document.getElementById('move-history');

  // 작성해주신 정규식 적용
  const regex = /\d+\.\s+.*?(?=\s+\d+\.|$)/g;
  const moves = pgnString.match(regex).map(move => move.trim());

  moves.forEach(moveStr => {
    // 공백을 기준으로 순번, 백 무브, 흑 무브 분리
    const parts = moveStr.split(/\s+/);
    const moveNum = parts[0];
    const whiteMove = parts[1] || '';
    const blackMove = parts[2] || '';

    const row = document.createElement('div');
    row.className = 'move-entry';

    // 턴 번호 (예: "1.")
    const numDiv = document.createElement('div');
    numDiv.className = 'move-number';
    numDiv.innerText = moveNum;
    row.appendChild(numDiv);

    // 백 무브 (White)
    const wDiv = document.createElement('div');
    wDiv.className = 'move-notation';
    if (whiteMove) {
      const wSpan = document.createElement('span');
      wSpan.className = 'clickable-move';
      wSpan.innerText = whiteMove;
      wSpan.onclick = () => {
        console.log('White move clicked:', whiteMove);
        // TODO: 클릭 시 체스보드 상태를 이 턴으로 돌리는 로직 추가
      };
      wDiv.appendChild(wSpan);
    }
    row.appendChild(wDiv);

    // 흑 무브 (Black)
    const bDiv = document.createElement('div');
    bDiv.className = 'move-notation';
    if (blackMove) {
      const bSpan = document.createElement('span');
      bSpan.className = 'clickable-move';
      bSpan.innerText = blackMove;
      bSpan.onclick = () => {
        console.log('Black move clicked:', blackMove);
        // TODO: 클릭 시 체스보드 상태를 이 턴으로 돌리는 로직 추가
      };
      bDiv.appendChild(bSpan);
    }
    row.appendChild(bDiv);

    moveHistoryContainer.appendChild(row);
  });

  // 스크롤을 항상 가장 아래로
  moveHistoryContainer.scrollTop = moveHistoryContainer.scrollHeight;
</script>
</body>
</html>
