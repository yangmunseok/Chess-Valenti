<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-DBMLJY2F5L"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Valenti - Post Detail</title>
  <link
      href="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.snow.css"
      rel="stylesheet"
  />
  <link th:href="@{/css/app.css}" rel="stylesheet">
  <link th:href="@{/css/home.css}" rel="stylesheet">
  <link th:href="@{/css/post.css}" rel="stylesheet">
  <link th:href="@{/css/editor.css}" rel="stylesheet">
  <meta name="_csrf" th:content="${_csrf.token}"/>
  <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
  </head>
  <body class="valenti-dark" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

  <div class="dashboard-wrapper">
  <div th:replace="~{fragment/component :: sidebar(username=${username}, url=${url})}"></div>
  <main class="main-content">
    <div class="home-container">
      <nav class="post-nav">
        <a href="javascript:history.back()" class="btn-back">← 목록으로 돌아가기</a>
      </nav>

      <article class="post-container">
        <header class="post-header">
          <div class="post-meta-top">
            <span th:if="${post instanceof T(org.spring.createa.chessvalenti.domain.Notice)}"
                  class="category-tag">NOTICE</span>
            <span th:if="${post instanceof T(org.spring.createa.chessvalenti.domain.FAQ)}"
                  class="category-tag">FAQ</span>
            <span th:if="${post instanceof T(org.spring.createa.chessvalenti.domain.Study)}"
                  class="category-tag">STUDY</span>

            <span th:if="${post instanceof T(org.spring.createa.chessvalenti.domain.Inquiry)}"
                  class="category-tag" th:text="${#strings.substring(post.category,8)}"></span>

            <span class="post-date"
                  th:text="${@timeUtil.format(post.createdAt,'yyyy-MM-dd HH:mm')}"></span>
          </div>
          <h1 class="post-title" th:text="${post.title}"></h1>
          <div class="author-meta" style="margin-top: 10px; color: #4b5563; font-size: 14px;" 
               th:if="${post instanceof T(org.spring.createa.chessvalenti.domain.Inquiry)}">
            작성자: <span th:text="${post.writer.username}"></span>
          </div>
        </header>

        <section
            th:if="${post instanceof T(org.spring.createa.chessvalenti.domain.Study) and post.videoUrl != null and !#strings.isEmpty(post.videoUrl)}"
            class="post-video-container">
          <div class="video-wrapper">
            <iframe th:src="'https://www.youtube.com/embed/' + ${post.videoUrl}"
                    frameborder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                    allowfullscreen>
            </iframe>
          </div>
        </section>

        <section class="post-content ql-snow">
          <div class="ql-editor" th:utext="${post.content}">
          </div>
        </section>

        <!-- 답변 영역 -->
        <section th:if="${post instanceof T(org.spring.createa.chessvalenti.domain.Inquiry)}" class="reply-section" style="margin-top: 40px; border-top: 1px solid rgba(255, 255, 255, 0.05); padding-top: 30px;">
          <div th:if="${post.answer != null}" class="answer-box" style="background: rgba(16, 185, 129, 0.05); border: 1px solid rgba(16, 185, 129, 0.1); border-radius: 16px; padding: 24px;">
            <div class="answer-header" style="display: flex; justify-content: space-between; margin-bottom: 16px;">
              <span style="color: #10B981; font-weight: 600; display: flex; align-items: center; gap: 8px;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                운영진 답변
              </span>
              <span style="color: #4b5563; font-size: 13px;" th:text="${@timeUtil.format(post.answeredAt, 'yyyy-MM-dd HH:mm')}"></span>
            </div>
            <div class="answer-content" style="color: #f1f5f9; line-height: 1.6; font-size: 15px;" th:utext="${post.answer}">
            </div>
          </div>

          <!-- 답변 작성 폼 (관리자 전용) -->
          <div sec:authorize="hasRole('ROLE_ADMIN')" class="admin-reply-form ql-snow" style="margin-top: 30px;">
            <h3 style="font-size: 16px; font-weight: 600; color: #fff; margin-bottom: 16px;">답변 작성</h3>
            <div id="reply-editor" style="height: 300px; background: #161b22; border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 14px;"></div>
            <div style="display: flex; justify-content: flex-end; margin-top: 16px;">
              <button id="submit-reply" class="btn-comment-submit" style="padding: 10px 24px; font-size: 14px;" th:data-id="${post.id}">답변 등록하기</button>
            </div>
          </div>
        </section>

        <!-- 댓글 영역 (FAQ 제외) -->
        <section th:if="${post instanceof T(org.spring.createa.chessvalenti.domain.Post) and post.type != T(org.spring.createa.chessvalenti.domain.PostType).FAQ}" 
                 class="comment-section" style="margin-top: 50px; border-top: 1px solid rgba(255, 255, 255, 0.05); padding-top: 40px;">
          
          <h2 style="font-size: 18px; font-weight: 600; color: #fff; margin-bottom: 24px; display: flex; align-items: center; gap: 8px;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
            댓글 <span style="color: var(--accent-purple);" th:text="${totalCommentCount}">0</span>
          </h2>

          <!-- 댓글 목록 -->
          <div class="comment-list" style="display: flex; flex-direction: column; gap: 32px; margin-bottom: 40px;">
            <div th:each="comment : ${comments}" class="comment-container">
              <!-- 부모 댓글 -->
              <div class="comment-item" style="display: flex; gap: 16px;">
                <div class="user-avatar" style="width: 40px; height: 40px; background: #3b4261; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 700; color: #fff; flex-shrink: 0;" th:text="${#strings.substring(comment.writer.username,0,1).toUpperCase()}">U</div>
                <div class="comment-body" style="flex: 1;">
                  <div class="comment-meta" style="display: flex; justify-content: space-between; margin-bottom: 6px;">
                    <div style="display: flex; align-items: center; gap: 10px;">
                      <span style="font-weight: 600; color: #f1f5f9; font-size: 14px;" th:text="${comment.writer.username}"></span>
                      <span style="color: #4b5563; font-size: 12px;" th:text="${@timeUtil.format(comment.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
                    </div>
                    <div class="comment-actions" style="display: flex; gap: 12px;">
                      <button class="btn-reply auth-required" style="background: none; border: none; color: #4b5563; font-size: 12px; cursor: pointer; padding: 0;" 
                              th:onclick="|toggleReplyForm(${comment.id})|">답글</button>
                      <button th:if="${isLoggedIn and (#authentication.name == comment.writer.username or #authorization.expression('hasRole(''ADMIN'')'))}" 
                              class="btn-delete-comment" style="background: none; border: none; color: #f7768e; font-size: 12px; cursor: pointer; padding: 0;"
                              th:onclick="|deleteComment(${comment.id})|">삭제</button>
                    </div>
                  </div>
                  <div class="comment-content" style="color: #94a3b8; font-size: 14px; line-height: 1.5;" th:text="${comment.content}">
                  </div>
                  
                  <!-- 답글 작성 폼 (기본 숨김) -->
                  <div th:id="'reply-form-' + ${comment.id}" class="reply-form" style="display: none; margin-top: 16px; background: rgba(255, 255, 255, 0.01); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 12px; padding: 16px;">
                    <textarea th:id="'reply-input-' + ${comment.id}" placeholder="답글을 입력하세요..." style="width: 100%; min-height: 60px; background: transparent; border: none; color: #fff; font-size: 13px; outline: none; resize: vertical; margin-bottom: 12px;"></textarea>
                    <div style="display: flex; justify-content: flex-end; gap: 8px;">
                      <button style="padding: 6px 12px; font-size: 12px; background: transparent; border: 1px solid rgba(255,255,255,0.1); color: #94a3b8; border-radius: 6px; cursor: pointer;" th:onclick="|toggleReplyForm(${comment.id})|">취소</button>
                      <button class="btn-comment-submit" style="padding: 6px 16px; font-size: 12px;" th:onclick="|submitReply(${comment.id}, ${post.postId})|">
                        답글 등록
                      </button>
                    </div>
                  </div>
                </div>
              </div>

              <!-- 자식 댓글 (대댓글) -->
              <div class="replies-container" style="margin-left: 56px; margin-top: 20px; display: flex; flex-direction: column; gap: 20px; border-left: 2px solid rgba(255, 255, 255, 0.03); padding-left: 20px;">
                <div th:each="reply : ${comment.children}" class="comment-item reply-item" style="display: flex; gap: 12px;">
                  <div class="user-avatar" style="width: 32px; height: 32px; background: #2a2f41; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0;" th:text="${#strings.substring(reply.writer.username,0,1).toUpperCase()}">U</div>
                  <div class="comment-body" style="flex: 1;">
                    <div class="comment-meta" style="display: flex; justify-content: space-between; margin-bottom: 4px;">
                      <div style="display: flex; align-items: center; gap: 8px;">
                        <span style="font-weight: 600; color: #f1f5f9; font-size: 13px;" th:text="${reply.writer.username}"></span>
                        <span style="color: #4b5563; font-size: 11px;" th:text="${@timeUtil.format(reply.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
                      </div>
                      <button th:if="${#authentication.name == reply.writer.username or #authorization.expression('hasRole(''ADMIN'')')}" 
                              class="btn-delete-comment" style="background: none; border: none; color: #f7768e; font-size: 11px; cursor: pointer; padding: 0;"
                              th:onclick="|deleteComment(${reply.id})|">삭제</button>
                    </div>
                    <div class="comment-content" style="color: #94a3b8; font-size: 13px; line-height: 1.5;" th:text="${reply.content}">
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <div th:if="${#lists.isEmpty(comments)}" style="padding: 40px; text-align: center; color: #4b5563; background: rgba(255, 255, 255, 0.02); border-radius: 12px;">
              첫 번째 댓글을 남겨보세요!
            </div>
          </div>

          <!-- 댓글 작성 폼 -->
          <div class="comment-form-box" style="background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 16px; padding: 20px;">
            <textarea id="comment-input" th:placeholder="${isLoggedIn ? '댓글을 입력하세요...' : '로그인 후 댓글을 작성할 수 있습니다.'}" 
                      style="width: 100%; min-height: 80px; background: transparent; border: none; color: #fff; font-size: 14px; outline: none; resize: vertical; margin-bottom: 12px;"
                      th:readonly="${!isLoggedIn}"></textarea>
            <div style="display: flex; justify-content: flex-end;">
              <button id="submit-comment" class="btn-comment-submit auth-required" th:data-id="${post.postId}">
                댓글 등록
              </button>
            </div>
          </div>
        </section>

        <!--footer class="post-footer">
          <div class="author-info">
            <div class="avatar">V</div>
            <span>Admin Official</span>
          </div>
        </footer-->
      </article>
    </div>
  </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.js"></script>
  <script sec:authorize="hasRole('ROLE_ADMIN')">
  const csrfToken = document.querySelector('meta[name="_csrf"]').content;
  const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;

  var quill = new Quill('#reply-editor', {
    modules: {
      toolbar: [
        ['bold', 'italic', 'underline'],
        ['link', 'code-block'],
        [{'list': 'ordered'}, {'list': 'bullet'}]
      ]
    },
    placeholder: '답변 내용을 입력해주세요.',
    theme: 'snow'
  });

  document.getElementById('submit-reply').addEventListener('click', function () {
    const id = this.dataset.id;
    const answer = quill.root.innerHTML;

    if (quill.getText().trim().length === 0) {
      alert('답변 내용을 입력해주세요.');
      return;
    }

    fetch(`/admin/api/inquiries/${id}/answer`, {
      method: 'POST',
      headers: {
        "Content-Type": "application/json",
        [csrfHeader]: csrfToken
      },
      body: JSON.stringify({ answer })
    }).then(res => {
      if (res.ok) {
        alert('답변이 등록되었습니다.');
        location.reload();
      } else {
        alert('답변 등록에 실패했습니다.');
      }
    }).catch(err => {
      console.error(err);
      alert('오류가 발생했습니다.');
    });
  });
  </script>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const submitBtn = document.getElementById('submit-comment');
      if (submitBtn) {
        submitBtn.addEventListener('click', function(e) {
          if (!isLoggedIn) {
            e.preventDefault();
            document.getElementById('login-confirm-modal').style.display = 'flex';
            return;
          }
          const postId = this.dataset.id;
          const content = document.getElementById('comment-input').value;
          const csrfToken = document.querySelector('meta[name="_csrf"]').content;
          const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;

          if (!content.trim()) {
            alert('댓글 내용을 입력해주세요.');
            return;
          }

          fetch(`/api/posts/${postId}/comments`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              [csrfHeader]: csrfToken
            },
            body: JSON.stringify({ content: content })
          }).then(res => {
            if (res.ok) {
              alert('댓글이 등록되었습니다.');
              location.reload();
            } else if (res.status === 403) {
              alert('로그인이 필요한 서비스입니다.');
            } else {
              alert('댓글 등록에 실패했습니다.');
            }
          }).catch(err => {
            console.error(err);
            alert('오류가 발생했습니다.');
          });
        });
      }
    });

    function toggleReplyForm(commentId) {
      if (!isLoggedIn) {
        document.getElementById('login-confirm-modal').style.display = 'flex';
        return;
      }
      const form = document.getElementById(`reply-form-${commentId}`);
      if (form.style.display === 'none') {
        form.style.display = 'block';
      } else {
        form.style.display = 'none';
      }
    }

    function submitReply(parentId, postId) {
      const content = document.getElementById(`reply-input-${parentId}`).value;
      const csrfToken = document.querySelector('meta[name="_csrf"]').content;
      const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;

      if (!content.trim()) {
        alert('답글 내용을 입력해주세요.');
        return;
      }

      fetch(`/api/posts/${postId}/comments`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          [csrfHeader]: csrfToken
        },
        body: JSON.stringify({ content: content, parentId: parentId })
      }).then(res => {
        if (res.ok) {
          alert('답글이 등록되었습니다.');
          location.reload();
        } else {
          alert('답글 등록에 실패했습니다.');
        }
      }).catch(err => {
        console.error(err);
        alert('오류가 발생했습니다.');
      });
    }

    function deleteComment(commentId) {
      if (!confirm('정말로 이 댓글을 삭제하시겠습니까?')) {
        return;
      }

      const csrfToken = document.querySelector('meta[name="_csrf"]').content;
      const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;

      fetch(`/api/comments/${commentId}`, {
        method: 'DELETE',
        headers: {
          [csrfHeader]: csrfToken
        }
      }).then(res => {
        if (res.ok) {
          alert('댓글이 삭제되었습니다.');
          location.reload();
        } else {
          alert('댓글 삭제에 실패했습니다.');
        }
      }).catch(err => {
        console.error(err);
        alert('오류가 발생했습니다.');
      });
    }
  </script>
  </body>
  </html>
