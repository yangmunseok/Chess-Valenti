<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-DBMLJY2F5L"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-DBMLJY2F5L');
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>valenti - Forgot Password</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <link th:href="@{/css/app.css}" rel="stylesheet">
  <link th:href="@{/css/login.css}" rel="stylesheet">
  <link th:href="@{/css/btn-refactor.css}" rel="stylesheet">
</head>
<body>
<div class="login-wrapper">
  <div class="login-card">
    <div class="logo">
      <div class="logo-dot"></div>
      valenti
    </div>

    <div class="login-header">
      <h1>비밀번호 찾기</h1>
      <p>가입하신 이메일 주소를 입력하시면 비밀번호 재설정 링크를 보내드립니다.</p>
    </div>

    <form action="/forgot-password" method="POST" class="login-form">
      <div class="input-group">
        <label for="email">이메일</label>
        <input type="email" id="email" name="email" placeholder="name@example.com" required
               autofocus>
      </div>

      <input type="hidden"
             th:name="${_csrf.parameterName}"
             th:value="${_csrf.token}"/>

      <button type="submit" class="btn btn-primary btn-lg">링크 보내기</button>
    </form>

    <div class="footer-links">
      이미 계정이 있으신가요? <a href="/login">로그인</a>
    </div>
  </div>
</div>
</body>
</html>
