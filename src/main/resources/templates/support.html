<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-DBMLJY2F5L"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-DBMLJY2F5L');
  </script>
  <meta charset="UTF-8">
  <title>Support Chess Insights - Preparation</title>
  <link rel="stylesheet" th:href="@{/css/app.css}">
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <style>
    .prep-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 80vh;
      text-align: center;
      padding: 20px;
    }
    .prep-icon {
      font-size: 64px;
      margin-bottom: 24px;
      color: var(--primary-color);
    }
    .prep-title {
      font-size: 32px;
      margin-bottom: 16px;
      font-weight: 700;
    }
    .prep-desc {
      color: var(--text-secondary);
      max-width: 500px;
      line-height: 1.6;
    }
    .back-btn {
      margin-top: 32px;
      padding: 12px 24px;
      background: var(--primary-color);
      color: white;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    .back-btn:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
<div th:replace="~{fragment/component :: sidebar(username=${username}, url='/support')}"></div>
<div class="main-content">
  <div class="prep-container">
    <div class="prep-icon">🚧</div>
    <h1 class="prep-title">후원 페이지 준비 중</h1>
    <p class="prep-desc">
      Chess Insights를 응원해 주셔서 감사합니다!<br>
      현재 더 나은 후원 경험을 위해 페이지를 정비하고 있습니다.<br>
      빠른 시일 내에 멋진 모습으로 찾아뵙겠습니다.
    </p>
    <a href="/" class="back-btn">홈으로 돌아가기</a>
  </div>
</div>
</body>
</html>
