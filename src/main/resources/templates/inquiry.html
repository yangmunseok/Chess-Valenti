<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-DBMLJY2F5L"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-DBMLJY2F5L');
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="_csrf" th:content="${_csrf.token}"/>
  <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
  <title>Valenti - Support</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <link
      href="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.snow.css"
      rel="stylesheet"
  />
  <link th:href="@{/css/app.css}" rel="stylesheet">
  <link th:href="@{/css/home.css}" rel="stylesheet">
  <link th:href="@{/css/editor.css}" rel="stylesheet">
  <link th:href="@{/css/inquiry.css}" rel="stylesheet">
</head>
<body class="valenti-dark">

<div class="dashboard-wrapper">
  <div th:replace="~{fragment/component :: sidebar(username=${username}, url=${url})}"></div>

  <main class="main-content">
    <div class="home-container">
      <header class="home-hero">
        <p class="hero-label">CUSTOMER SUPPORT</p>
        <h1>운영진에게 <span class="blue-text">문의하기</span></h1>
        <p class="hero-desc">서비스 이용 중 불편한 점이나 제안하고 싶은 내용을 자유롭게 남겨주세요.</p>
      </header>

      <section class="support-form-section">
        <div class="input-row">
          <div class="input-group category-select">
            <label>CATEGORY</label>
            <select id="inquiry-category" class="valenti-input">
              <option value="INQUIRY_GENERAL">일반 문의</option>
              <option value="INQUIRY_BUG">버그 리포트</option>
              <option value="INQUIRY_SUGGESTION">기능 제안</option>
              <option value="INQUIRY_ACCOUNT">계정/결제 문의</option>
            </select>
          </div>
          <div class="input-group title-input">
            <label>SUBJECT</label>
            <input type="text" placeholder="문의 제목을 입력하세요." class="valenti-input" id="post-title">
          </div>
        </div>

        <div class="input-group">
          <label>MESSAGE</label>
          <div id="editor-container"></div>
        </div>

        <div class="editor-actions">
          <p class="support-note">문의하신 내용은 운영진 검토 후 가입하신 이메일로 회신 드립니다.</p>
          <button class="btn-publish" id="save-post">문의 제출하기 →</button>
        </div>
      </section>

      <section class="inquiry-list-section">
        <div class="section-header">
          <h2>나의 문의 내역</h2>
        </div>
        
        <div class="inquiry-table-wrapper">
          <table class="valenti-table">
            <thead>
              <tr>
                <th>Category</th>
                <th>Subject</th>
                <th class="hide-mobile">Date</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="inq : ${inquiries}">
                <td class="col-category">
                  <span class="category-badge" th:text="${#strings.substring(inq.category,8)}"></span>
                </td>
                <td class="col-subject">
                  <a th:href="@{/inquiries/{id}(id=${inq.id})}" th:text="${inq.title}"></a>
                  <div class="mobile-date show-mobile" th:text="${@timeUtil.format(inq.createdAt, 'yyyy-MM-dd')}"></div>
                </td>
                <td class="col-date hide-mobile" th:text="${@timeUtil.format(inq.createdAt, 'yyyy-MM-dd')}"></td>
                <td class="col-status">
                  <span th:if="${inq.answer == null}" class="status-waiting">답변 대기</span>
                  <span th:if="${inq.answer != null}" class="status-complete">답변 완료</span>
                </td>
              </tr>
              <tr th:if="${#lists.isEmpty(inquiries.content)}">
                <td colspan="4" class="no-data">문의 내역이 없습니다.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.js"></script>
<script>
  const csrfToken = document.querySelector('meta[name="_csrf"]').content;
  const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;

  var quill = new Quill('#editor-container', {
    modules: {
      toolbar: [
        ['bold', 'italic', 'underline'],
        ['link', 'image', 'code-block'],
        [{'list': 'ordered'}, {'list': 'bullet'}]
      ]
    },
    placeholder: '문의 내용을 상세히 작성해주시면 빠른 처리가 가능합니다.',
    theme: 'snow'
  });

  document.getElementById('save-post').addEventListener('click', function () {
    const title = document.getElementById('post-title').value;
    const content = quill.root.innerHTML; // HTML 형태로 내용 가져오기
    const category = document.getElementById('inquiry-category').value;
    if (!title) {
      alert('제목을 입력해주세요.');
      return;
    }

    console.log("발행 데이터:", {title, content});
    fetch("/api/inquiries",
        {
          method: 'post', headers: {
            "Content-Type": "application/json",
            [csrfHeader]: csrfToken
          }, body: JSON.stringify({title, content, category})
        }).then(
        (res) => {
          alert('문의가 성공적으로 제출되었습니다.');
          location.reload();
        });
  });

</script>
</body>
</html>
