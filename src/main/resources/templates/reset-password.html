<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-DBMLJY2F5L"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-DBMLJY2F5L');
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>valenti - Reset Password</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <link th:href="@{/css/app.css}" rel="stylesheet">
  <link th:href="@{/css/login.css}" rel="stylesheet">
  <link th:href="@{/css/btn-refactor.css}" rel="stylesheet">
</head>
<body>
<div class="login-wrapper">
  <div class="login-card">
    <div class="logo">
      <div class="logo-dot"></div>
      valenti
    </div>

    <div class="login-header">
      <h1>비밀번호 재설정</h1>
      <p>새로운 비밀번호를 입력해주세요.</p>
    </div>

    <form action="/reset-password" method="POST" class="login-form">
      <input type="hidden" name="token" th:value="${token}"/>

      <div class="input-group">
        <label for="password">새 비밀번호</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required autofocus>
      </div>

      <div class="input-group">
        <label for="confirmPassword">비밀번호 확인</label>
        <input type="password" id="confirmPassword" placeholder="••••••••" required>
      </div>

      <input type="hidden"
             th:name="${_csrf.parameterName}"
             th:value="${_csrf.token}"/>

      <button type="submit" class="btn btn-primary btn-lg">비밀번호 변경</button>
    </form>
  </div>
</div>

<script>
  const password = document.getElementById("password");
  const confirmPassword = document.getElementById("confirmPassword");

  function validatePassword(){
    if(password.value != confirmPassword.value) {
      confirmPassword.setCustomValidity("비밀번호가 일치하지 않습니다.");
    } else {
      confirmPassword.setCustomValidity('');
    }
  }

  password.onchange = validatePassword;
  confirmPassword.onkeyup = validatePassword;
</script>
</body>
</html>
