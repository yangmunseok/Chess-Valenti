<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>valenti - Study</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
  <link th:href="@{/css/app.css}" rel="stylesheet">
  <link th:href="@{/css/home.css}" rel="stylesheet">
  <link th:href="@{/css/btn-refactor.css}" rel="stylesheet">
  <style>
    .study-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
      margin-top: 32px;
    }
    .study-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 0; /* Changed to handle image */
      transition: transform 0.2s, border-color 0.2s;
      cursor: pointer;
      overflow: hidden; /* Added for image corners */
    }
    .study-card:hover {
      transform: translateY(-4px);
      border-color: var(--accent-blue);
    }
    .study-card .thumbnail {
      width: 100%;
      height: 180px;
      background: rgba(255, 255, 255, 0.05);
      object-fit: cover;
      display: block;
    }
    .study-card .card-body {
      padding: 24px;
    }
    .study-card .category {
      font-size: 12px;
      color: var(--accent-blue);
      font-weight: 600;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .study-card h3 {
      margin-bottom: 12px;
      font-size: 18px;
    }
    .study-card p {
      color: var(--text-muted);
      font-size: 14px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
<div class="dashboard-wrapper">
  <div th:replace="~{fragment/component :: sidebar(username=${username}, url='/study')}"></div>

  <main class="main-content">
    <div class="home-container">
      <header class="home-hero">
        <p class="hero-label">LEARN & IMPROVE</p>
        <h1>Chess <span class="blue-text">Study</span> Room</h1>
        <p class="hero-desc">전략적인 체스 실력 향상을 위한 학습 자료 공간입니다.</p>
      </header>

      <div class="study-grid">
        <div th:each="study : ${studies}" class="study-card"
             th:onclick="'location.href=\'/posts/' + ${study.postId} + '\''">
          <img th:if="${study instanceof T(org.spring.createa.chessvalenti.domain.Study) and !#strings.isEmpty(study.imageUrl)}"
               th:src="${study.imageUrl}" class="thumbnail" alt="Study Thumbnail">
          <div th:unless="${study instanceof T(org.spring.createa.chessvalenti.domain.Study) and !#strings.isEmpty(study.imageUrl)}"
               class="thumbnail" style="display: flex; align-items: center; justify-content: center; font-size: 48px; color: rgba(255,255,255,0.1);">
            🎓
          </div>
          <div class="card-body">
            <div class="category">
              <span th:text="${study instanceof T(org.spring.createa.chessvalenti.domain.Study) ? study.difficulty : 'NOTICE'}">Difficulty</span>
            </div>
            <h3 th:text="${study.title}">루이 로페즈 (Ruy Lopez) 기초</h3>
            <p class="introduction" th:if="${study instanceof T(org.spring.createa.chessvalenti.domain.Study)}"
               th:text="${study.introduction}" style="font-weight: 500; color: var(--accent-blue); margin-bottom: 8px;"></p>
            <p th:text="${#strings.abbreviate(study.plainTextContent, 100)}">백의 가장 강력한 무기 중 하나인 루이 로페즈의 핵심 아이디어와 메인 라인을 학습합니다.</p>
          </div>
        </div>

        <!-- Static Fallback if no studies exist yet -->
        <div th:if="${#lists.isEmpty(studies)}" class="study-card">
          <div class="category">Opening</div>
          <h3>등록된 강의가 없습니다.</h3>
          <p>새로운 체스 강의가 곧 업데이트될 예정입니다.</p>
        </div>
      </div>
    </div>
  </main>
</div>
</body>
</html>
