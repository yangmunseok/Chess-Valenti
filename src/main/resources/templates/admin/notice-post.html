<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-DBMLJY2F5L"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-DBMLJY2F5L');
  </script>
  <meta charset="UTF-8">
  <meta name="_csrf" th:content="${_csrf.token}"/>
  <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
  <meta name="post_id" th:unless="${post==null}" th:content="${post.postId}"/>
  <title>Valenti - Create Content</title>
  <link
      href="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.snow.css"
      rel="stylesheet"
  />
  <link rel="stylesheet" href="/css/app.css">
  <link rel="stylesheet" href="/css/admin.css">
  <link rel="stylesheet" href="/css/home.css">
  <link rel="stylesheet" href="/css/editor.css">
  <link rel="stylesheet" href="/css/btn-refactor.css">
</head>
<body class="valenti-dark">

<div class="dashboard-wrapper">
  <nav th:replace="~{fragment/component :: adminSidebar(url='/admin/contents')}"></nav>
  <main class="main-content">
    <div class="home-container">
      <header class="home-hero">
        <p class="hero-label">CONTENT MANAGEMENT</p>
        <h1 th:if="${post == null}">새로운 글 <span class="blue-text">작성하기</span></h1>
        <h1 th:unless="${post == null}">공지 <span class="blue-text">수정하기</span></h1>
      </header>

      <section class="editor-section">
        <div class="input-group">
          <label for="post-title">TITLE</label>
          <input type="text" id="post-title" th:placeholder="${post == null? '제목을 입력하세요...':''}"
                 th:value="${post == null? '':post.title}"
                 class="valenti-input">
        </div>

        <div class="input-group">
          <label for="post-type">TYPE</label>
          <select id="post-type" class="valenti-input" onchange="toggleStudyFields()"
                  th:disabled="${post != null or param.containsKey('type')}">
            <option value="NOTICE"
                    th:selected="${(post != null and post.type == T(org.spring.createa.chessvalenti.domain.PostType).NOTICE) or (param.type != null and param.type[0] == 'NOTICE')}">
              NOTICE
            </option>
            <option value="FAQ"
                    th:selected="${(post != null and post.type == T(org.spring.createa.chessvalenti.domain.PostType).FAQ) or (param.type != null and param.type[0] == 'FAQ')}">
              FAQ
            </option>
            <option value="STUDY"
                    th:selected="${(post != null and post.type == T(org.spring.createa.chessvalenti.domain.PostType).STUDY) or (param.type != null and param.type[0] == 'STUDY')}">
              STUDY
            </option>
          </select>
          <p th:if="${post != null or param.containsKey('type')}" class="hero-desc"
             style="font-size: 12px; margin-top: 4px; color: var(--text-muted);">
            * 작성 중에는 타입을 변경할 수 없습니다.
          </p>
        </div>

        <div id="study-only-fields" style="display: none;">
          <div class="input-group">
            <label for="difficulty">DIFFICULTY</label>
            <select id="difficulty" class="valenti-input">
              <option value="BEGINNER"
                      th:selected="${post instanceof T(org.spring.createa.chessvalenti.domain.Study) and post.difficulty == T(org.spring.createa.chessvalenti.domain.Difficulty).BEGINNER}">
                BEGINNER
              </option>
              <option value="INTERMEDIATE"
                      th:selected="${post instanceof T(org.spring.createa.chessvalenti.domain.Study) and post.difficulty == T(org.spring.createa.chessvalenti.domain.Difficulty).INTERMEDIATE}">
                INTERMEDIATE
              </option>
              <option value="ADVANCED"
                      th:selected="${post instanceof T(org.spring.createa.chessvalenti.domain.Study) and post.difficulty == T(org.spring.createa.chessvalenti.domain.Difficulty).ADVANCED}">
                ADVANCED
              </option>
            </select>
          </div>

          <div class="input-group">
            <label for="introduction">INTRODUCTION (Short summary for card)</label>
            <input type="text" id="introduction" placeholder="강의 요약 내용을 입력하세요..."
                   th:value="${post instanceof T(org.spring.createa.chessvalenti.domain.Study) ? post.introduction : ''}"
                   class="valenti-input">
          </div>

          <div class="input-group">
            <label for="image-file">THUMBNAIL IMAGE (Optional)</label>
            <input type="file" id="image-file" accept="image/*" class="valenti-input">
            <p th:if="${post instanceof T(org.spring.createa.chessvalenti.domain.Study) and post.imageUrl != null}"
               class="hero-desc"
               style="font-size: 12px; margin-top: 4px; color: var(--text-muted);">
              * 현재 이미지: <span th:text="${post.imageUrl}"></span> (새 파일을 선택하면 교체됩니다)
            </p>
          </div>

          <div class="input-group">
            <label for="video-url">YOUTUBE VIDEO ID (Optional)</label>
            <input type="text" id="video-url" placeholder="e.g., dQw4w9WgXcQ"
                   th:value="${post instanceof T(org.spring.createa.chessvalenti.domain.Study) ? post.videoUrl : ''}"
                   class="valenti-input">
          </div>
        </div>

        <div class="input-group">
          <label>CONTENT</label>
          <div id="editor-container" th:utext="${post== null? '':post.content}"></div>
        </div>

        <div class="editor-actions">
          <button class="btn-secondary" onclick="history.back()">취소</button>
          <button th:unless="${post==null}" class="btn btn-danger btn-outline" id="delete-post">포스트
            삭제하기
          </button>
          <button class="btn-valenti-primary" id="save-post"
                  th:text="${post==null? '포스트 발행하기 →':'포스트 수정하기 →'}">
          </button>
        </div>
      </section>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.js"></script>
<script>
  const csrfToken = document.querySelector('meta[name="_csrf"]').content;
  const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;
  const postId = document.querySelector('meta[name="post_id"]') ? document.querySelector(
      'meta[name="post_id"]').content : null
  // 에디터 설정
  var quill = new Quill('#editor-container', {
    modules: {
      toolbar: [
        [{header: [1, 2, false]}],
        ['bold', 'italic', 'underline', 'strike'],
        ['blockquote', 'code-block'],
        [{'list': 'ordered'}, {'list': 'bullet'}],
        ['link', 'image'],
        ['clean']
      ]
    },
    placeholder: '내용을 상세히 입력해주세요...',
    theme: 'snow'
  });

  function toggleStudyFields() {
    const postType = document.getElementById('post-type').value;
    const studyFields = document.getElementById('study-only-fields');
    if (postType === 'STUDY') {
      studyFields.style.display = 'block';
    } else {
      studyFields.style.display = 'none';
    }
  }

  // 초기 로드 시 실행
  toggleStudyFields();

  // 발행 버튼 클릭 이벤트
  document.getElementById('save-post').addEventListener('click', function () {
    const title = document.getElementById('post-title').value;
    const postType = document.getElementById('post-type').value;
    const videoUrl = document.getElementById('video-url').value;
    const difficulty = document.getElementById('difficulty').value;
    const introduction = document.getElementById('introduction').value;
    const imageFile = document.getElementById('image-file').files[0];
    const content = quill.root.innerHTML; // HTML 형태로 내용 가져오기

    if (!title) {
      alert('제목을 입력해주세요.');
      return;
    }

    const formData = new FormData();
    formData.append('title', title);
    formData.append('content', content);
    formData.append('postType', postType);
    formData.append('videoUrl', videoUrl);
    formData.append('difficulty', difficulty);
    formData.append('introduction', introduction);
    if (imageFile) {
      formData.append('imageFile', imageFile);
    }

    const url = postId === null ? "/admin/api/posts" : `/admin/api/posts/${postId}`;
    const method = postId === null ? 'POST' : 'PATCH';

    fetch(url, {
      method: method,
      headers: {
        [csrfHeader]: csrfToken
        // Note: Do NOT set Content-Type header for FormData; the browser will set it with the correct boundary
      },
      body: formData
    }).then(res => {
      if (res.ok) {
        alert('글이 성공적으로 기록되었습니다.');
        location.href = '/admin/contents';
      } else {
        alert('오류가 발생했습니다.');
      }
    });
  });

  // 삭제 버튼 클릭 이벤트
  if (document.getElementById('delete-post') !== null) {
    document.getElementById('delete-post').addEventListener('click', function () {
      console.log('delete post.')
      fetch(`/admin/api/posts/${postId}`,
          {
            method: 'DELETE', headers: {
              "Content-Type": "application/json",
              [csrfHeader]: csrfToken
            }
          }).then(
          (res) => {
            alert('글이 성공적으로 삭제되었습니다.')
            const json = res.json().then((json) => console.log(json))
          })
    })
  }

</script>
</body>
</html>
