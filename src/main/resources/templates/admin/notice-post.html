<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="_csrf" th:content="${_csrf.token}"/>
  <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
  <meta name="post_id" th:unless="${post==null}" th:content="${post.postId}"/>
  <title>Valenti - Create Content</title>
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/app.css">
  <link rel="stylesheet" href="/css/admin.css">
  <link rel="stylesheet" href="/css/home.css">
  <link rel="stylesheet" href="/css/editor.css">
  <link rel="stylesheet" href="/css/btn-refactor.css">
</head>
<body class="valenti-dark">

<div class="dashboard-wrapper">
  <nav th:replace="~{/fragment/component :: adminSidebar}"></nav>
  <main class="main-content">
    <div class="home-container">
      <header class="home-hero">
        <p class="hero-label">CONTENT MANAGEMENT</p>
        <h1 th:if="${post == null}">새로운 글 <span class="blue-text">작성하기</span></h1>
        <h1 th:unless="${post == null}">공지 <span class="blue-text">수정하기</span></h1>
      </header>

      <section class="editor-section">
        <div class="input-group">
          <label for="post-title">TITLE</label>
          <input type="text" id="post-title" th:placeholder="${post == null? '제목을 입력하세요...':''}"
                 th:value="${post == null? '':post.title}"
                 class="valenti-input">
        </div>

        <div class="input-group">
          <label for="post-type">TYPE</label>
          <select id="post-type" class="valenti-input">
            <option value="NOTICE" th:selected="${post != null and post.type == T(org.spring.createa.chessvalenti.domain.PostType).NOTICE}">NOTICE</option>
            <option value="FAQ" th:selected="${post != null and post.type == T(org.spring.createa.chessvalenti.domain.PostType).FAQ}">FAQ</option>
            <option value="STUDY" th:selected="${post != null and post.type == T(org.spring.createa.chessvalenti.domain.PostType).STUDY}">STUDY</option>
          </select>
        </div>

        <div class="input-group">
          <label for="video-url">YOUTUBE VIDEO ID (Optional)</label>
          <input type="text" id="video-url" placeholder="e.g., dQw4w9WgXcQ"
                 th:value="${post == null? '':post.videoUrl}"
                 class="valenti-input">
        </div>

        <div class="input-group">
          <label>CONTENT</label>
          <div id="editor-container" th:utext="${post== null? '':post.content}"></div>
        </div>

        <div class="editor-actions">
          <button class="btn-secondary" onclick="history.back()">취소</button>
          <button th:unless="${post==null}" class="btn btn-danger btn-outline" id="delete-post">포스트
            삭제하기
          </button>
          <button class="btn-valenti-primary" id="save-post"
                  th:text="${post==null? '포스트 발행하기 →':'포스트 수정하기 →'}">
          </button>
        </div>
      </section>
    </div>
  </main>
</div>

<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
<script>
  const csrfToken = document.querySelector('meta[name="_csrf"]').content;
  const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;
  const postId = document.querySelector('meta[name="post_id"]') ? document.querySelector(
      'meta[name="post_id"]').content : null
  // 에디터 설정
  var quill = new Quill('#editor-container', {
    modules: {
      toolbar: [
        [{header: [1, 2, false]}],
        ['bold', 'italic', 'underline', 'strike'],
        ['blockquote', 'code-block'],
        [{'list': 'ordered'}, {'list': 'bullet'}],
        ['link', 'image'],
        ['clean']
      ]
    },
    placeholder: '내용을 상세히 입력해주세요...',
    theme: 'snow'
  });

  // 발행 버튼 클릭 이벤트
  document.getElementById('save-post').addEventListener('click', function () {
    const title = document.getElementById('post-title').value;
    const postType = document.getElementById('post-type').value;
    const videoUrl = document.getElementById('video-url').value;
    const content = quill.root.innerHTML; // HTML 형태로 내용 가져오기

    if (!title) {
      alert('제목을 입력해주세요.');
      return;
    }

    const payload = {title, content, postType, videoUrl};
    console.log("발행 데이터:", payload);

    if (postId === null) {
      fetch("/admin/api/posts",
          {
            method: 'post', headers: {
              "Content-Type": "application/json",
              [csrfHeader]: csrfToken
            }, body: JSON.stringify(payload)
          }).then(
          (res) => {
            alert('글이 성공적으로 기록되었습니다.')
            location.href = '/admin/support';
          })
      return;
    }
    fetch(`/admin/api/posts/${postId}`, {
      method: 'PATCH', headers: {
        "Content-Type": "application/json",
        [csrfHeader]: csrfToken
      }, body: JSON.stringify(payload)
    }).then(
        (res) => {
          alert('글이 성공적으로 기록되었습니다.')
          location.href = '/admin/support';
        })
  });

  // 삭제 버튼 클릭 이벤트
  document.getElementById('delete-post').addEventListener('click', function () {
    console.log('delete post.')
    fetch(`/admin/api/posts/${postId}`,
        {
          method: 'DELETE', headers: {
            "Content-Type": "application/json",
            [csrfHeader]: csrfToken
          }
        }).then(
        (res) => {
          alert('글이 성공적으로 삭제되었습니다.')
          const json = res.json().then((json) => console.log(json))
        })
  })
</script>
</body>
</html>
