<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-DBMLJY2F5L"></script>
  <script>
    window.dataLayer = window.dataLayer || [];

    function gtag() {
      dataLayer.push(arguments);
    }

    gtag('js', new Date());

    gtag('config', 'G-DBMLJY2F5L');
  </script>
  <meta charset="UTF-8">
  <meta name="_csrf" th:content="${_csrf.token}"/>
  <meta name="_csrf_header" th:content="${_csrf.headerName}"/>

  <title>valenti Admin - Content Management</title>
  <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"/>
  <link href="https://fonts.cdnfonts.com/css/chess-alpha" rel="stylesheet">
  <link rel="stylesheet" href="/css/app.css">
  <link rel="stylesheet" href="/css/admin.css">
  <link th:href="@{/css/btn-refactor.css}" rel="stylesheet">
</head>
<body class="admin-body">
<nav th:replace="~{fragment/component :: adminSidebar(url='/admin/contents')}"></nav>
<main class="admin-main">
  <header class="admin-header">
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <h2>콘텐츠 관리</h2>
    </div>
  </header>
  <div class="admin-tabs" th:data-current="${mode}">
    <button id="tab-notice" class="tab-btn" onclick="window.location='/admin/contents?mode=notice'">
      공지사항 관리
    </button>
    <button id="tab-faq" class="tab-btn" onclick="window.location='/admin/contents?mode=faq'">
      FAQ 설정
    </button>
    <button id="tab-study" class="tab-btn" onclick="window.location='/admin/contents?mode=study'">
      스터디 관리
    </button>
  </div>
  <div id="tab-notice-content" class="tab-content">
    <section
        th:replace="~{fragment/content :: noticeSection(contents=${notice},currentPage=${currentPage}, totalPages=${totalPages})}"></section>
  </div>
  <div id="tab-faq-content" class="tab-content">
    <section th:replace="~{fragment/content :: faqSection(contents=${faq})}"></section>
  </div>
  <div id="tab-study-content" class="tab-content">
    <section
        th:replace="~{fragment/content :: studySection(contents=${study},currentPage=${currentPage}, totalPages=${totalPages})}"></section>
  </div>
</main>

<script type="module" th:src="@{/js/btnhandler.js}"></script>
<script type="module" th:src="@{/js/newStructure/pagination.js}"></script>
</body>
<script>
  const mode = document.querySelector('.admin-tabs').dataset.current
  console.log(mode);

  if (mode === 'notice' || mode === null || mode === '') {
    document.getElementById('tab-notice').classList.add('active');
    document.getElementById('tab-notice-content').classList.add('active');
  } else if (mode === 'faq') {
    document.getElementById('tab-faq').classList.add('active');
    document.getElementById('tab-faq-content').classList.add('active');
  } else if (mode === 'study') {
    document.getElementById('tab-study').classList.add('active');
    document.getElementById('tab-study-content').classList.add('active');
  }

  function deletePost(id) {
    if (!confirm('정말로 이 글을 삭제하시겠습니까?')) {
      return;
    }

    const csrfToken = document.querySelector('meta[name="_csrf"]').content;
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;

    fetch(`/api/admin/posts/${id}`, {
      method: 'DELETE',
      headers: {
        [csrfHeader]: csrfToken
      }
    }).then(res => {
      if (res.ok) {
        alert('성공적으로 삭제되었습니다.');
        location.reload();
      } else {
        alert('삭제에 실패했습니다.');
      }
    }).catch(err => {
      console.error(err);
      alert('오류가 발생했습니다.');
    });
  }
</script>
</html>
