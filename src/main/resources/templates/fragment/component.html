<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>valenti - Chess</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
  <link href="https://fonts.cdnfonts.com/css/chess-alpha" rel="stylesheet">
  <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<div th:fragment="sidebar(username,url)" class="sidebar">
  <a href="/" class="logo">
    <div class="logo-dot"></div>
    valenti
  </a>

  <nav class="nav-menu">
    <a href="/analysis" class="nav-item"
       th:classappend="${#strings.equals('/analysis',url) ? 'active':''}">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="2" y1="12" x2="22" y2="12"/>
        <path
            d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
      </svg>
      <span>Analysis</span>
    </a>

    <a href="/#" class="nav-item"
       th:classappend="${#strings.equals('/study',url) ? 'active':''}" inactive>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
      </svg>
      <span>Study</span>
    </a>

    <a href="/insight" class="nav-item"
       th:classappend="${#strings.equals('/insight',url) ? 'active':''}">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="20" x2="18" y2="10"/>
        <line x1="12" y1="20" x2="12" y2="4"/>
        <line x1="6" y1="20" x2="6" y2="14"/>
      </svg>
      <span>Insight</span>
    </a>

    <a href="/support" class="nav-item"
       th:classappend="${#strings.equals('/support',url) ? 'active':''}">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path
            d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
      </svg>
      <span>Support</span>
    </a>

    <a th:href="@{/inquiry}" class="nav-item"
       th:classappend="${#strings.equals('/inquiry', url) ? 'active' : ''}">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
      </svg>
      <span>Contact</span>
    </a>
  </nav>
  <div class="user-section">
    <form action="/logout" method="post" class="user-profile">
      <div class="user-avatar">
        <span th:text="${#strings.toUpperCase(#strings.substring(username,0,1))}">Y</span>
      </div>
      <div class="user-info">
        <span class="user-name"
              th:text="${username}"></span>
        <span class="user-status">Online</span>
      </div>
      <button class="logout-btn" title="로그아웃" type="submit">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/>
        </svg>
      </button>
    </form>
  </div>
</div>
<nav th:fragment="adminSidebar" class="admin-sidebar">
  <div class="admin-logo">valenti <span>Admin</span></div>
  <ul class="admin-menu">
    <li class="active"><a href="#dashboard">📊 대시보드 인사이트</a></li>
    <li><a href="/admin/users">👥 사용자 관리</a></li>
    <li><a href="/admin/contents">📝 콘텐츠 관리</a></li>
    <li><a href="/admin/support">✉️ 소통 & 문의</a></li>
    <li><a href="/admin/finance">💰 결제/금융 관리</a></li>
    <li><a href="/admin/security">🛡️ 보안 & 권한</a></li>
  </ul>
  <div class="admin-user-bottom">
    <p>관리자: <strong>양문석</strong></p>
    <a href="/logout">로그아웃</a>
  </div>
</nav>

<div th:fragment="stopModal" id="stop-modal" class="admin-modal-overlay">
  <div class="admin-modal">
    <div class="modal-header">
      <div class="icon-warning">!</div>
      <h3>사용자 활동 정지</h3>
    </div>
    <div class="modal-body">
      <p><strong>양문석 (munseok@example.com)</strong> 사용자의 활동을 정지하시겠습니까?</p>
      <p class="desc">정지된 사용자는 로그인이 차단되며, 모든 서비스 이용이 제한됩니다.</p>

      <div class="form-group">
        <label>정지 사유 선택</label>
        <select class="admin-select">
          <option>부적절한 콘텐츠 게시</option>
          <option>비정상적인 결제 활동</option>
          <option>운영 정책 위반</option>
          <option>기타 (직접 입력)</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary-sm" onclick="closeModal()">취소</button>
      <button class="btn-danger-confirm" onclick="confirmStop()">정지 처리</button>
    </div>
  </div>
</div>
</body>
